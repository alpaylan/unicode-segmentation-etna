# ETNA workload index for unicode-segmentation.
#
# One [[variant]] per injected mutation. Source of truth for variant->property
# mapping. Every other fact is derivable from the source tree:
#   - ls patches/*.patch                               (patch-based variants)
#   - grep -rn "pub fn property_" src/                 (property functions)
#   - grep -rn "fn witness_.*_case_" tests/ src/       (witness tests)
#
# Base commit for this workload is HEAD of the bootstrap ancestor of all
# etna/<variant> branches. Recover with: `git merge-base --octopus etna/*`.

[[variant]]
name = "grapheme_next_boundary_unwrap_0f55f70_1"
property = "grapheme_next_boundary_empty_chunk_no_panic"
injection = "patch"
patch = "patches/grapheme_next_boundary_unwrap_0f55f70_1.patch"
source_commit = "0f55f70b445202fd9d3c101b9936e6649e808441"
witnesses = [
    "witness_grapheme_next_boundary_empty_chunk_no_panic_case_ascii_suffix",
    "witness_grapheme_next_boundary_empty_chunk_no_panic_case_legacy_mode",
    "witness_grapheme_next_boundary_empty_chunk_no_panic_case_multibyte",
]
frameworks = ["proptest", "quickcheck", "crabcheck", "hegel"]
files = ["src/grapheme.rs"]

